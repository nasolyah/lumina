services:
  - type: web
    name: lum-api
    runtime: python
    plan: free
    # Python 3.14 (дефолт Render) ещё без готовых wheel для pydantic-core/cryptography
    # → сборка из исходников падает. Фиксируем 3.12 (есть бинарные колёса под всё).
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # задаётся вручную в дашборде Render (секрет)
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SUPABASE_URL
        value: https://fyjofluosbonribyvssx.supabase.co
      - key: LIGHT_MODEL
        value: gemini-flash-lite-latest
      - key: POWER_MODEL
        value: gemini-flash-latest
      - key: MAX_OUTPUT_TOKENS
        value: "2048"
      - key: THINKING_BUDGET
        value: "0"
      - key: MAX_TEXT_CHARS
        value: "100000"
      - key: LLM_RETRIES
        value: "3"
      - key: CHUNK_SIZE
        value: "300"
      - key: TOP_K
        value: "3"
      - key: CHUNK_DELAY
        value: "0.5"
      - key: TYPE_BOOST
        value: "0.25"
