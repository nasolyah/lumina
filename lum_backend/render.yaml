services:
  - type: web
    name: lum-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # задаётся вручную в дашборде Render (секрет)
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LIGHT_MODEL
        value: openai/gpt-oss-20b
      - key: POWER_MODEL
        value: openai/gpt-oss-120b
      - key: LIGHT_FALLBACKS
        value: llama-3.1-8b-instant
      - key: POWER_FALLBACKS
        value: qwen/qwen3.6-27b,llama-3.3-70b-versatile
      - key: CHUNK_SIZE
        value: "300"
      - key: TOP_K
        value: "3"
      - key: CHUNK_DELAY
        value: "0.5"
      - key: TYPE_BOOST
        value: "0.25"
